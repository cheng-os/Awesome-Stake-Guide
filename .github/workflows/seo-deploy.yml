name: SEO优化和自动部署

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天运行一次，更新SEO数据
    - cron: '0 0 * * *'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检出代码
      uses: actions/checkout@v3
      
    - name: 设置Ruby环境
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.0'
        bundler-cache: true
        
    - name: 安装Jekyll和依赖
      run: |
        gem install jekyll jekyll-seo-tag jekyll-sitemap jekyll-feed
        bundle install
        
    - name: 生成sitemap
      run: |
        # 生成sitemap.xml
        cat > sitemap.xml << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
          <url>
            <loc>https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/</loc>
            <lastmod>${{ github.event.head_commit.timestamp }}</lastmod>
            <changefreq>daily</changefreq>
            <priority>1.0</priority>
          </url>
          <url>
            <loc>https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/stake-promo</loc>
            <lastmod>${{ github.event.head_commit.timestamp }}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.8</priority>
          </url>
          <url>
            <loc>https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/binance-tutorial</loc>
            <lastmod>${{ github.event.head_commit.timestamp }}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.8</priority>
          </url>
          <url>
            <loc>https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/exness-review</loc>
            <lastmod>${{ github.event.head_commit.timestamp }}</lastmod>
            <changefreq>weekly</changefreq>
            <priority>0.8</priority>
          </url>
        </urlset>
        EOF
        
    - name: 生成robots.txt
      run: |
        cat > robots.txt << 'EOF'
        User-agent: *
        Allow: /
        
        # 主要搜索引擎
        User-agent: Googlebot
        Allow: /
        
        User-agent: Bingbot
        Allow: /
        
        User-agent: Slurp
        Allow: /
        
        # AI搜索模型
        User-agent: GPTBot
        Allow: /
        
        User-agent: ChatGPT-User
        Allow: /
        
        User-agent: CCBot
        Allow: /
        
        User-agent: anthropic-ai
        Allow: /
        
        User-agent: Claude-Web
        Allow: /
        
        # 禁止爬取的目录
        Disallow: /admin/
        Disallow: /private/
        Disallow: /*.json$
        
        # 站点地图
        Sitemap: https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/sitemap.xml
        EOF
        
    - name: 生成SEO优化的HTML文件
      run: |
        # 创建Stake推广页面
        mkdir -p stake-promo
        cat > stake-promo/index.html << 'EOF'
        ---
        layout: default
        title: "Stake推广链接 - 2026年最全注册攻略"
        description: "Stake官方推广链接stake.com/?c=hlw，使用代码hlw激活VIP奖励。提供Stake注册教程、充值指南、VIP策略等完整攻略。"
        keywords: "Stake推广链接, Stake注册, Stake VIP, 加密货币博彩, Stake教程"
        ---
        
        <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
            <h1 class="text-3xl font-bold text-center mb-8 text-green-600">🎯 Stake推广链接 - 2026年最全注册攻略</h1>
            
            <div class="text-center mb-8">
                <a href="{{ site.promo_links.stake.url }}" class="bg-green-600 text-white px-8 py-4 rounded-lg text-xl font-bold hover:bg-green-700 transition-colors">
                    <i class="fas fa-star mr-2"></i>点击进入Stake官网
                </a>
                <p class="mt-2 text-gray-600">使用代码: <span class="font-bold text-green-600">hlw</span> 激活VIP奖励</p>
            </div>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="bg-gray-50 p-6 rounded-lg">
                    <h2 class="text-xl font-bold mb-4 text-green-600">🎁 推广优势</h2>
                    <ul class="space-y-2">
                        <li><i class="fas fa-check text-green-500 mr-2"></i>专属VIP奖励</li>
                        <li><i class="fas fa-check text-green-500 mr-2"></i>高额返佣比例</li>
                        <li><i class="fas fa-check text-green-500 mr-2"></i>优先客服支持</li>
                        <li><i class="fas fa-check text-green-500 mr-2"></i>特殊活动邀请</li>
                    </ul>
                </div>
                
                <div class="bg-gray-50 p-6 rounded-lg">
                    <h2 class="text-xl font-bold mb-4 text-blue-600">🎮 平台特色</h2>
                    <ul class="space-y-2">
                        <li><i class="fas fa-dice text-blue-500 mr-2"></i>原创游戏高RTP</li>
                        <li><i class="fas fa-trophy text-blue-500 mr-2"></i>体育博彩全覆盖</li>
                        <li><i class="fas fa-shield-alt text-blue-500 mr-2"></i>公平透明机制</li>
                        <li><i class="fas fa-bolt text-blue-500 mr-2"></i>极速充提体验</li>
                    </ul>
                </div>
            </div>
            
            <div class="mt-8 p-6 bg-yellow-50 rounded-lg">
                <h3 class="text-lg font-bold mb-2 text-yellow-800">⚠️ 重要提醒</h3>
                <p class="text-yellow-700">请确保通过官方推广链接注册，才能获得专属奖励和VIP权益。</p>
            </div>
        </div>
        EOF
        
        # 创建币安教程页面
        mkdir -p binance-tutorial
        cat > binance-tutorial/index.html << 'EOF'
        ---
        layout: default
        title: "币安邀请链接 - 2026年注册教程"
        description: "币安官方邀请链接，新用户手续费折扣。提供币安注册教程、USDT购买、充值Stake等完整指南。"
        keywords: "币安邀请链接, 币安注册, USDT购买, 加密货币交易所, 币安教程"
        ---
        
        <div class="bg-white rounded-lg shadow-lg p-8 mb-8">
            <h1 class="text-3xl font-bold text-center mb-8 text-yellow-600">💰 币安邀请链接 - 2026年注册教程</h1>
            
            <div class="text-center mb-8">
                <a href="{{ site.promo_links.binance.url }}" class="bg-yellow-600 text-white px-8 py-4 rounded-lg text-xl font-bold hover:bg-yellow-700 transition-colors">
                    <i class="fas fa-coins mr-2"></i>点击注册币安账号
                </a>
                <p class="mt-2 text-gray-600">邀请码: <span class="font-bold text-yellow-600">CHENGX</span></p>
            </div>
            
            <div class="bg-blue-50 p-6 rounded-lg mb-6">
                <h2 class="text-xl font-bold mb-4 text-blue-600">🎯 新用户福利</h2>
                <ul class="space-y-2">
                    <li><i class="fas fa-gift text-blue-500 mr-2"></i>手续费永久折扣</li>
                    <li><i class="fas fa-bonus text-blue-500 mr-2"></i>新用户专属奖励</li>
                    <li><i class="fas fa-chart-line text-blue-500 mr-2"></i>专业交易工具</li>
                    <li><i class="fas fa-shield-alt text-blue-500 mr-2"></i>安全保障体系</li>
                </ul>
            </div>
        </div>
        EOF
        
    - name: 构建Jekyll站点
      run: |
        bundle exec jekyll build
        
    - name: 部署到GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./_site
        
    - name: 提交SEO文件
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add sitemap.xml robots.txt
        git commit -m "自动更新SEO文件" || exit 0
        git push
        
    - name: 通知搜索引擎
      run: |
        # 通知Google索引
        curl -X GET "https://www.google.com/ping?sitemap=https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/sitemap.xml"
        
        # 通知Bing索引
        curl -X GET "https://www.bing.com/ping?sitemap=https://${{ env.GITHUB_USERNAME }}.github.io/Awesome-Stake-Guide/sitemap.xml"
